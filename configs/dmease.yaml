paths:
  patient_db: data/examples/patients.jsonl
  triples: data/examples/triples.jsonl
  herb_targets: data/examples/herb_target_affinity.csv
  output_dir: outputs

inference:
  max_herbs: 7
  residual_threshold: 0.08
  pmi_threshold: 0.0
  discount_gamma: 0.95
  contraindication_penalty: 0.35

model:
  policy: heuristic_kan
  kan_hidden_width: 32
  constitution_embedding_dim: 8
  seed: 42

llm:
  provider: offline
  model_name: Baichuan-TCM-7B
  extraction_prompt: prompts/triplet_extraction_zh.md
