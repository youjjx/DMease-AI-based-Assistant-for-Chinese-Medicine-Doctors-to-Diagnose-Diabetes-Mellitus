name: paper-env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip=23.3
  - pytorch=2.2.0
  - torchvision=0.17.0
  - torchaudio=2.2.0
  - pytorch-cuda=12.1
  - numpy=1.26.4
  - pandas=2.2.0
  - matplotlib=3.8.2
  - scikit-learn=1.4.0
  - jupyter
  - ipykernel
  - pip:
    - lightning==2.2.0
    - hydra-core==1.3.2
    - omegaconf==2.3.0
    - torchmetrics==1.3.1
    - split-folders==0.5.1
    - pillow==10.2.0
    - tqdm==4.66.2
    - wandb==0.16.3